<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credit Card OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white border border-zinc-200 rounded-3xl p-8 shadow-xl shadow-zinc-200/50">
      <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold tracking-tight text-zinc-900">Credit Card OS</h1>
          <p class="text-sm text-zinc-500">Your financial toolkit</p>
        </div>
      </div>

      <div class="space-y-4">
        <h2 class="text-xs font-bold text-zinc-400 uppercase tracking-widest mb-2">Available Tools</h2>
        
        <a 
          href="gyftr.html" 
          class="group flex items-center justify-between p-4 bg-zinc-50 border border-zinc-200 rounded-2xl hover:border-indigo-500 hover:bg-white transition-all"
        >
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white border border-zinc-200 rounded-xl flex items-center justify-center text-zinc-600 group-hover:text-indigo-600 group-hover:border-indigo-100 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
            </div>
            <div>
              <p class="font-bold text-zinc-900">Gyftr Explorer</p>
              <p class="text-xs text-zinc-500">HDFC SmartBuy Brand List</p>
            </div>
          </div>
          <svg class="w-5 h-5 text-zinc-300 group-hover:text-indigo-500 transform group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </a>

        <!-- Placeholder for future tools -->
        <div class="p-4 border border-dashed border-zinc-200 rounded-2xl opacity-50">
          <p class="text-xs text-center text-zinc-400 font-medium">More tools coming soon...</p>
        </div>
      </div>

      <footer class="mt-8 pt-6 border-t border-zinc-100">
        <p class="text-[10px] text-center text-zinc-400 uppercase tracking-widest font-bold">
          Built for sudhirmishra.github.io
        </p>
      </footer>
    </div>
  </body>
</html>

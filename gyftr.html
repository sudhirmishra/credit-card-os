<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gyftr Brand Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
      @layer utilities {
        .no-scrollbar::-webkit-scrollbar {
          display: none;
        }
        .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
      }
    </style>
  </head>
  <body class="bg-zinc-50">
    <div id="app" class="min-h-screen pb-20">
      <!-- Header -->
      <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-zinc-200">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
              </div>
              <div>
                <h1 class="text-xl font-bold tracking-tight text-zinc-900">Gyftr Explorer</h1>
                <p class="text-xs text-zinc-500 font-medium uppercase tracking-wider">HDFC Bank Discounts</p>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <div class="relative flex-1 md:w-80">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input
                  id="search-input"
                  type="text"
                  placeholder="Search 290+ brands..."
                  class="w-full pl-10 pr-10 py-2 bg-zinc-100 border-transparent focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 rounded-xl text-sm transition-all outline-none"
                />
                <button 
                  id="clear-search"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 hidden"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Categories -->
          <div class="mt-4 flex items-center gap-2 overflow-x-auto pb-2 no-scrollbar">
            <svg class="w-4 h-4 text-zinc-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
            <div id="category-filters" class="flex items-center gap-2"></div>
          </div>
        </div>
      </header>

      <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center justify-between mb-6">
          <h2 id="brands-count" class="text-sm font-semibold text-zinc-500 uppercase tracking-widest">
            0 Brands Found
          </h2>
          <button 
            id="clear-filters"
            class="text-xs font-medium text-indigo-600 hover:text-indigo-700"
          >
            Clear all filters
          </button>
        </div>

        <div class="bg-white border border-zinc-200 rounded-2xl overflow-hidden shadow-sm">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="bg-zinc-50 border-b border-zinc-200">
                  <th class="px-6 py-4 text-xs font-bold text-zinc-400 uppercase tracking-widest">Brand Name</th>
                  <th class="px-6 py-4 text-xs font-bold text-zinc-400 uppercase tracking-widest">Category</th>
                  <th class="px-6 py-4 text-xs font-bold text-zinc-400 uppercase tracking-widest text-right">Action</th>
                </tr>
              </thead>
              <tbody id="brands-tbody" class="divide-y divide-zinc-100">
                <!-- Brands will be rendered here -->
              </tbody>
            </table>
          </div>
        </div>
      </main>

      <!-- Info Footer -->
      <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-40">
        <div class="bg-zinc-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-4 text-sm font-medium border border-white/10 backdrop-blur-xl">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
            <span>Live Data from Gyftr</span>
          </div>
          <div class="w-px h-4 bg-white/20"></div>
          <a 
            href="https://www.gyftr.com/hdfcsmartbuy/" 
            target="_blank" 
            rel="noopener noreferrer"
            class="flex items-center gap-1.5 hover:text-indigo-300 transition-colors"
          >
            Visit Portal <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
          </a>
        </div>
      </div>
    </div>
    <script src="src/main.js"></script>
  </body>
</html>
